query:
  core: '(COPD OR "chronic obstructive pulmonary disease" OR asthma OR bronchiectasis OR IPF OR "Pulmonary fibrosis" OR "smoking cessation" OR "Catheter-related bloodstream infection" OR CRBSI OR "catheter-associated urinary tract infection" OR CAUTI OR "ventilator-associated pneumonia" OR VAP OR "osteoinductive factor" OR BICRI OR REVOCART OR minocycline OR fluzole OR "chronic cough" OR "interstitial lung disease" OR ILD OR pneumonia OR tuberculosis OR "lung abscess" OR "pulmonary embolism" OR "pulmonary hypertension" OR "pulmonary arterial hypertension" OR "respiratory failure" OR "mechanical ventilation" OR "pleural effusion")'
  study_type_filter: 'AND (Randomized Controlled Trial[PT] OR Meta-Analysis[PT] OR Systematic Review[PT]) AND humans[MH]'
  negative_filter: 'NOT (pediatric OR child OR children OR infants OR neonatal OR animal OR rat OR rats OR mouse OR mice OR murine OR rodent OR "in vitro" OR "cell line" OR "animal model" OR thoracotomy OR lobectomy OR pneumonectomy OR "nerve block" OR "plane block" OR "serratus block" OR perioperative OR intraoperative OR "general anesthesia" OR anaesthesia OR "surgical resection" OR "traditional Chinese medicine" OR "Chinese herbal" OR acupuncture OR moxibustion OR "herbal medicine" OR "folk medicine" OR cupping)'

search:
  # mhda = MeSH date (when indexing completes and [PT]/[MH] tags are applied).
  # Must NOT be 'edat' while the query filters on [PT]/[MH] tags, or it returns ~0 daily.
  datetype:
    - mhda

report:
  gemini_model: 'gemini-2.5-flash'
  language: zh-TW
  email_subject_prefix: '[Future Lab]'
