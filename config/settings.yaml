# Output branch switches (persistent default). Each can be overridden per-run by an env
# var on/off: RUN_ZOTERO / RUN_EMAIL / RUN_GDRIVE (used by the GitHub Actions "Run workflow"
# inputs, or locally e.g. `RUN_ZOTERO=off python pubmed_automation.py`).
branches:
  zotero: false   # Branch A — OFF
  email: true     # Branch B — Gemini email digest
  gdrive: false   # Branch C — OFF，只要 Email

query:
  study_type_filter: 'AND (Randomized Controlled Trial[PT] OR Meta-Analysis[PT] OR Systematic Review[PT]) AND humans[MH]'

  negatives:
    nonhuman: 'animal OR rat OR rats OR mouse OR mice OR murine OR rodent OR "in vitro" OR "cell line" OR "animal model"'
    pediatric: 'pediatric OR child OR children OR infants OR neonatal'
    surgical: 'thoracotomy OR lobectomy OR pneumonectomy OR "nerve block" OR "plane block" OR "serratus block" OR perioperative OR intraoperative OR "general anesthesia" OR anaesthesia OR "surgical resection"'
    tcm: '"traditional Chinese medicine" OR "Chinese herbal" OR acupuncture OR moxibustion OR "herbal medicine" OR "folk medicine" OR cupping'
    oncology: '"Lung Neoplasms"[MH]'
    neuro: '"Cerebrovascular Disorders"[Majr] OR "Brain Injuries"[Majr] OR "Intracranial Hemorrhages"[Majr]'

  axes:
    - key: pulmonary
      name: '肺部疾病'
      core: '("Lung Diseases"[Majr] OR "Pleural Diseases"[Majr] OR "Pulmonary Embolism"[Majr] OR "Hypertension, Pulmonary"[Majr] OR "Respiratory Insufficiency"[Majr] OR "Cough"[Majr] OR "Hemoptysis"[Majr] OR "Cystic Fibrosis"[Majr])'
      negatives: [nonhuman, pediatric, surgical, tcm, oncology]
      sjr_categories: ['Pulmonary and Respiratory Medicine']

    - key: infection_control
      name: '感控'
      core: '("Cross Infection"[Majr] OR "Infection Control"[Majr] OR "Catheter-Related Infections"[Majr] OR "Pneumonia, Ventilator-Associated"[Majr] OR "Antimicrobial Stewardship"[Majr] OR "Hand Hygiene"[Majr])'
      negatives: [nonhuman, pediatric, surgical, tcm, oncology]
      sjr_categories: ['Infectious Diseases', 'Microbiology (medical)']

    - key: critical_care
      name: '重症'
      core: '("Critical Care"[Majr] OR "Critical Illness"[Majr] OR "Intensive Care Units"[Majr] OR "Sepsis"[Majr] OR "Shock, Septic"[Majr] OR "Respiratory Distress Syndrome"[Majr] OR "Respiratory Insufficiency"[Majr] OR "Respiration, Artificial"[Majr])'
      negatives: [nonhuman, pediatric, surgical, tcm, oncology, neuro]
      sjr_categories: ['Critical Care and Intensive Care Medicine']

    - key: biosheng
      name: '博晟產品線'
      core: '("osteoinductive factor" OR OIF OR BICRI OR REVOCART OR RevoCart OR minocycline OR fluzole)'
      negatives: [nonhuman, pediatric]
      sjr_categories: ['Orthopedics and Sports Medicine', 'Biomedical Engineering']
      allowed_quartiles: ['Q1', 'Q2']

    - key: smoking_cessation
      name: '戒菸'
      core: '("Smoking Cessation"[Majr] OR "Tobacco Use Cessation"[Majr] OR "Tobacco Use Disorder"[Majr] OR "Vaping"[Majr] OR "Electronic Nicotine Delivery Systems"[Majr] OR "smoking cessation" OR "tobacco cessation" OR "quit smoking" OR "smoking abstinence" OR "nicotine replacement")'
      negatives: [nonhuman, pediatric, surgical, tcm, oncology]
      sjr_categories: ['Public Health, Environmental and Occupational Health', 'Psychiatry and Mental Health', 'Pulmonary and Respiratory Medicine']
      allowed_quartiles: ['Q1', 'Q2']

    - key: ebp_implementation
      name: '實證應用/JBI'
      core: '("Evidence-Based Practice"[Majr] OR "Guideline Adherence"[Majr] OR "Quality Improvement"[Majr] OR "Diffusion of Innovation"[Majr] OR "Translational Research, Biomedical"[Majr] OR "evidence-based practice" OR "evidence implementation" OR "best practice implementation" OR "Joanna Briggs" OR "JBI")'
      negatives: [nonhuman, tcm]
      sjr_categories: ['Nursing (miscellaneous)', 'Advanced and Specialized Nursing', 'Health Policy']
      allowed_quartiles: ['Q1', 'Q2']

search:
  datetype:
    - mhda
  lookback_days: 1
  retmax: 100
  per_article_delay_seconds: 13
  inter_axis_delay_seconds: 0.5

sjr:
  enabled: true
  csv_path: 'data/scimago.csv.gz'
  allowed_quartiles: ['Q1']
  include_unindexed: true

report:
  gemini_model: 'gemini-2.5-flash'
  gemini_fallback_models:
    - 'gemini-2.5-flash-lite'
    - 'gemini-2.0-flash'
  gemini_max_retries: 4
  gemini_backoff_base_seconds: 15
  language: zh-TW
  email_subject_prefix: '[Future Lab]'
  smtp_host: 'smtp.gmail.com'
  smtp_port: 587
