query:
  core: '(COPD OR "chronic obstructive pulmonary disease" OR asthma OR bronchiectasis OR IPF OR "Pulmonary fibrosis" OR "smoking cessation" OR "Catheter-related bloodstream infection" OR CRBSI OR "catheter-associated urinary tract infection" OR CAUTI OR "ventilator-associated pneumonia" OR VAP OR "osteoinductive factor" OR BICRI OR REVOCART OR minocycline OR fluzole OR "chronic cough")'
  study_type_filter: 'AND (Randomized Controlled Trial[PT] OR Meta-Analysis[PT] OR Systematic Review[PT]) AND humans[MH]'
  negative_filter: 'NOT (pediatric OR child OR children OR infants OR neonatal OR animal OR rat OR rats OR mouse OR mice OR murine OR rodent OR "in vitro" OR "cell line" OR "animal model")'

search:
  datetype:
    - edat

report:
  gemini_model: 'gemini-2.5-flash'
  language: zh-TW
  email_subject_prefix: '[Future Lab]'
